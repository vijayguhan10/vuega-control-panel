name: Deploy Control Panel Backend to EC2 and Notify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        working-directory: control_plane
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "control_plane/target/app.jar"
          target: "/home/server/control-pannel-backend/vuega-control-panel/control_plane/"
          strip_components: 2
          overwrite: true

      - name: Restart Spring Boot Service
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deployment started at $(date)"
            sudo systemctl restart controlplane
            sudo systemctl status controlplane --no-pager
            echo "Deployment finished at $(date)"

      # ---------------- SUCCESS EMAIL ----------------
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Control Panel Backend Deployment Successful"
          to: "lingesh480500@gmail.com"
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ✅ Deployment Successful!

            Repository: ${{ github.repository }}
            Branch: main
            Commit: ${{ github.sha }}
            Triggered By: ${{ github.actor }}
            Time: ${{ github.event.head_commit.timestamp }}

            EC2 Host: ${{ secrets.EC2_HOST }}

      # ---------------- FAILURE EMAIL ----------------
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Spring Boot Deployment Failed"
          to: "lingesh480500@gmail.com"
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            ❌ Deployment Failed!

            Repository: ${{ github.repository }}
            Branch: main
            Commit: ${{ github.sha }}
            Triggered By: ${{ github.actor }}

            Check full logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
